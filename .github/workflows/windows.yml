# .github/workflows/windows.yml — GONYETI TLS
#
# Builds a Windows release (.zip) of the Flutter desktop app on every push to main.
#
# ── How secrets flow ────────────────────────────────────────────────────────
#  1. Go to your repo → Settings → Secrets and Variables → Actions
#  2. Add two repository secrets:
#       GONYETI_ANON_KEY   — Supabase publishable anon key
#       GONYETI_BASE_URL   — https://<project>.supabase.co/functions/v1
#  3. This workflow injects them via --dart-define at build time.
#
# ── Jobs ────────────────────────────────────────────────────────────────────
#   lint   → static analysis (non-blocking)
#   test   → unit tests
#   build  → Windows release build + zip artifact upload
#
# ── One-time GitHub repo setup ───────────────────────────────────────────────
#  1. Settings → Secrets → Actions → add GONYETI_BASE_URL and GONYETI_ANON_KEY
# ─────────────────────────────────────────────────────────────────────────────

name: Flutter Windows CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.6"

jobs:
  # ── Static analysis (non-blocking) ────────────────────────────────────────
  lint:
    name: Analyse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true

      - name: Analyse code
        run: flutter analyze --fatal-warnings

  # ── Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
        continue-on-error: true

  # ── Windows release build ─────────────────────────────────────────────────
  build:
    name: Build Windows
    runs-on: windows-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: >
          flutter build windows
          --release
          --dart-define=GONYETI_BASE_URL=${{ secrets.GONYETI_BASE_URL }}
          --dart-define=GONYETI_ANON_KEY=${{ secrets.GONYETI_ANON_KEY }}

      - name: Archive release bundle
        uses: actions/upload-artifact@v4
        with:
          name: gonyeti-tls-windows
          path: build/windows/x64/runner/Release/
          retention-days: 30
          if-no-files-found: error
