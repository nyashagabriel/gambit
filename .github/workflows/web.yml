# .github/workflows/web.yml — GAMBIT TSL
# Runs on every push / PR to main.
#
# Jobs:
#   test   → static analysis + unit tests (no device needed)
#   build  → web release build, uploads artifact
#   deploy → deploys to GitHub Pages on main only (optional — remove if using other host)
#
# Required secrets (Settings → Secrets → Actions):
#   GAMBIT_ANON_KEY      — Supabase publishable anon key
#   GAMBIT_BASE_URL      — https://<project>.supabase.co/functions/v1

name: Flutter Web CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: "3.41.2"

jobs:
  # ── Static analysis + unit tests ──────────────────────────────────────────────
  test:
    name: Analyse & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyse code
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
        # Non-blocking — comment out if you don't use Codecov
        continue-on-error: true

  # ── Web release build ─────────────────────────────────────────────────────────
  build:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (release, CanvasKit renderer for consistent rendering)
        run: |
          flutter build web \
            --release \
            --base-href="/gambit/" \
            --dart-define=GAMBIT_BASE_URL=${{ secrets.GAMBIT_BASE_URL }} \
            --dart-define=GAMBIT_ANON_KEY=${{ secrets.GAMBIT_ANON_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web/
          retention-days: 7

  # ── Deploy to GitHub Pages (main branch only) ─────────────────────────────────
  deploy:
    name: Deploy to Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: web-release
          path: build/web

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4