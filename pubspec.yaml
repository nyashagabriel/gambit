name: gambit
description: Gambit TSL — Transport & Logistics Management System
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP
  http: ^1.2.1

  # Secure local storage (JWT persistence)
  shared_preferences: ^2.3.2

  # File picking (document uploads)
  file_picker: ^8.1.2

  # URL launching (support email link in help panel)
  url_launcher: ^6.3.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true